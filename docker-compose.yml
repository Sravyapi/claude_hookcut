# Local development infrastructure only.
# App services (backend, worker, beat, frontend) run natively via ./dev.sh
# For full Docker stack, see docker-compose.prod.yml

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hookcut
      POSTGRES_USER: hookcut
      POSTGRES_PASSWORD: hookcut_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hookcut"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
