version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hookcut
      POSTGRES_USER: hookcut
      POSTGRES_PASSWORD: hookcut_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./hookcut-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://hookcut:hookcut_dev@postgres:5432/hookcut
      REDIS_URL: redis://redis:6379/0
      FRONTEND_URL: http://localhost:3000
      FEATURE_V0_MODE: "false"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./hookcut-backend:/app
      - /tmp/hookcut:/tmp/hookcut
    env_file:
      - ./hookcut-backend/.env

  worker:
    build: ./hookcut-backend
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2
    environment:
      DATABASE_URL: postgresql://hookcut:hookcut_dev@postgres:5432/hookcut
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    volumes:
      - ./hookcut-backend:/app
      - /tmp/hookcut:/tmp/hookcut
    env_file:
      - ./hookcut-backend/.env

  beat:
    build: ./hookcut-backend
    command: celery -A app.tasks.celery_app beat --loglevel=info
    environment:
      DATABASE_URL: postgresql://hookcut:hookcut_dev@postgres:5432/hookcut
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    volumes:
      - ./hookcut-backend:/app
    env_file:
      - ./hookcut-backend/.env

volumes:
  pgdata:
